services:
  - type: web
    name: ph-remit-api
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: WISE_API_BASE_URL
        value: https://api.wise.com
      - key: CACHE_TTL_SECONDS
        value: "300"
      - key: API_PREFIX
        value: /api/v1
      - key: APP_NAME
        value: PH Remittance Rates API
      - key: APP_VERSION
        value: "1.0.0"